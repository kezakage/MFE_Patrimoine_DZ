version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patrimoinehub}
      POSTGRES_USER: ${POSTGRES_USER:-patrimoine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patrimoine}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patrimoine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-patrimoine}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-patrimoine123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-patrimoine} ${AWS_SECRET_ACCESS_KEY:-patrimoine123};
      mc mb -p local/${AWS_STORAGE_BUCKET_NAME:-patrimoinehub-media} || true;
      mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME:-patrimoinehub-media} || true;
      exit 0;
      "

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 patrimoinehub.asgi:application"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AWS_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - .:/app
      - mediadata:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: .
    command: celery -A patrimoinehub worker -l info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AWS_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - .:/app
      - mediadata:/app/media
    depends_on:
      - db
      - redis
      - web

  beat:
    build: .
    command: celery -A patrimoinehub beat -l info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - worker

volumes:
  pgdata:
  miniodata:
  mediadata:
